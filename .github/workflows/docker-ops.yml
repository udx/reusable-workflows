        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Validate build paths
        id: validate_build_paths
        env:
          WORKING_DIRECTORY_INPUT: ${{ env.WORKING_DIRECTORY }}
          DOCKERFILE_PATH_INPUT: ${{ env.DOCKERFILE_PATH }}
        run: |
          set -euo pipefail
          workspace_root="$(realpath "${GITHUB_WORKSPACE}")"
          resolved_context="$(realpath -m "${GITHUB_WORKSPACE}/${WORKING_DIRECTORY_INPUT}")"
          resolved_dockerfile="$(realpath -m "${GITHUB_WORKSPACE}/${DOCKERFILE_PATH_INPUT}")"

          case "${resolved_context}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid build context path: ${WORKING_DIRECTORY_INPUT}"; exit 1 ;;
          esac
          case "${resolved_dockerfile}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid Dockerfile path: ${DOCKERFILE_PATH_INPUT}"; exit 1 ;;
          esac

          [[ -d "${resolved_context}" ]] || { echo "::error::Build context directory not found: ${WORKING_DIRECTORY_INPUT}"; exit 1; }
          [[ -f "${resolved_dockerfile}" ]] || { echo "::error::Dockerfile not found: ${DOCKERFILE_PATH_INPUT}"; exit 1; }

          printf 'context=%s\n' "${resolved_context}" >> "$GITHUB_OUTPUT"
          printf 'dockerfile=%s\n' "${resolved_dockerfile}" >> "$GITHUB_OUTPUT"

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev"

      # Create safe branch name for feature branches
      - name: Create safe branch name
        if: env.IS_RELEASE_BRANCH == 'false'
        run: |
          set -euo pipefail
          # Create safe branch name by replacing slashes with dashes
          SAFE_BRANCH_NAME=$(echo "${CURRENT_BRANCH}" | sed 's/\//-/g')
          [[ "${SAFE_BRANCH_NAME}" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::Invalid safe branch name: ${SAFE_BRANCH_NAME}"; exit 1; }
          printf 'SAFE_BRANCH_NAME=%s\n' "${SAFE_BRANCH_NAME}" >> "$GITHUB_ENV"

      # Delete existing images to prevent orphaned resources
      - name: Delete existing images in Artifact Registry
        if: env.IS_RELEASE_BRANCH == 'false'
        # Skip for production builds which use semantic versioning
        run: |
          echo "🔄 Checking for existing feature branch images..."
          # Define variables
          IMAGE_PATH="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPO}/${IMAGE_NAME}"
          TAG="${SAFE_BRANCH_NAME}"

          echo "ℹ️ Looking for tag: ${TAG} in ${IMAGE_PATH}"

          # Get the digest for the tag using tags list command
          DIGEST=$(gcloud artifacts docker tags list ${IMAGE_PATH} | grep -w "${TAG}" | awk '{print $3}' 2>/dev/null || echo "")

          if [ -n "${DIGEST}" ]; then
            echo "ℹ️ Found existing image with digest: ${DIGEST}"

            # Delete the image by digest
            echo "🗑️ Deleting previous image by digest..."
            gcloud artifacts docker images delete ${IMAGE_PATH}@${DIGEST} --delete-tags --quiet

            echo "✅ Previous image deletion completed"
          else
            echo "ℹ️ No previous image found with tag ${TAG}"
          fi

      # Prepare GCP Docker tags based on branch and settings
      - name: Prepare GCP Docker tags
        id: prepare_gcp_tags
        run: |
          set -euo pipefail
          echo "🔄 Preparing GCP Docker tags..."
          # Set tags based on branch
          if [[ "${IS_RELEASE_BRANCH}" == "true" ]]; then
            # Production release - use semantic version and latest tag
            TAGS="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPO}/${IMAGE_NAME}:${RELEASE_VERSION},${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPO}/${IMAGE_NAME}:latest"
            echo "ℹ️ Production release: Adding both version and latest tags"
          else
            # Feature branch build - only use branch name tag
            TAGS="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPO}/${IMAGE_NAME}:${SAFE_BRANCH_NAME}"
            echo "ℹ️ Feature branch build: Using branch name tag only"
          fi

          [[ "${TAGS}" =~ ^[A-Za-z0-9./,:_-]+$ ]] || { echo "::error::Invalid GCP Docker tags."; exit 1; }
          printf 'GCP_DOCKER_TAGS=%s\n' "${TAGS}" >> "$GITHUB_ENV"
          echo "✅ GCP Tags prepared: $TAGS"

      - name: Push Image
        env:
          BUILD_CONTEXT: ${{ steps.validate_build_paths.outputs.context }}
          BUILD_DOCKERFILE: ${{ steps.validate_build_paths.outputs.dockerfile }}
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r line; do
            [[ -n "${line}" ]] || continue
            build_args+=(--build-arg "${line}")
          done <<< "${BUILD_ARGS}"

          tag_args=()
          IFS=',' read -ra tags <<< "${GCP_DOCKER_TAGS}"
          for tag in "${tags[@]}"; do
            [[ -n "${tag}" ]] || continue
            tag_args+=(--tag "${tag}")
          done

          docker buildx build \
            --platform "${BUILD_PLATFORM}" \
            --file "${BUILD_DOCKERFILE}" \
            --push \
            --no-cache \
            "${build_args[@]}" \
            "${tag_args[@]}" \
            "${BUILD_CONTEXT}"

      - name: Log out from Google Cloud
        run: docker logout


          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Log out
        run: docker logout

  build-arm64:
    # TODO: If ubuntu-24.04-arm is unavailable, set ARM64_RUNNER_LABEL to a self-hosted arm64 label.
    runs-on: ${{ vars.ARM64_RUNNER_LABEL != '' && vars.ARM64_RUNNER_LABEL || 'ubuntu-24.04-arm' }}
    needs: [config, github-release]
    if: |
      always() &&
      success() &&
      needs.config.outputs.docker_has_credentials == 'true' &&
      needs.config.outputs.docker_has_publish_config == 'true' &&
      needs.config.outputs.is_release_branch == 'true'
    permissions:
      contents: write
    env:
      DOCKER_LOGIN: ${{ needs.config.outputs.docker_login }}
      DOCKER_PASSWORD: ${{ secrets.docker_token }}
      DOCKER_ORG: ${{ needs.config.outputs.docker_org }}
      DOCKER_REPO: ${{ needs.config.outputs.docker_repo }}
      RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
      DOCKERFILE_PATH: ${{ needs.config.outputs.dockerfile_path }}
      WORKING_DIRECTORY: ${{ needs.config.outputs.working_directory }}
      BUILD_ARGS: ${{ needs.config.outputs.build_args }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          cache-binary: ${{ needs.config.outputs.enable_cache == 'true' }}

      - name: Log in
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_LOGIN }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Validate build paths
        id: validate_build_paths
        env:
          WORKING_DIRECTORY_INPUT: ${{ env.WORKING_DIRECTORY }}
          DOCKERFILE_PATH_INPUT: ${{ env.DOCKERFILE_PATH }}
        run: |
          set -euo pipefail
          workspace_root="$(realpath "${GITHUB_WORKSPACE}")"
          resolved_context="$(realpath -m "${GITHUB_WORKSPACE}/${WORKING_DIRECTORY_INPUT}")"
          resolved_dockerfile="$(realpath -m "${GITHUB_WORKSPACE}/${DOCKERFILE_PATH_INPUT}")"

          case "${resolved_context}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid build context path: ${WORKING_DIRECTORY_INPUT}"; exit 1 ;;
          esac
          case "${resolved_dockerfile}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid Dockerfile path: ${DOCKERFILE_PATH_INPUT}"; exit 1 ;;
          esac

          [[ -d "${resolved_context}" ]] || { echo "::error::Build context directory not found: ${WORKING_DIRECTORY_INPUT}"; exit 1; }
          [[ -f "${resolved_dockerfile}" ]] || { echo "::error::Dockerfile not found: ${DOCKERFILE_PATH_INPUT}"; exit 1; }

          printf 'context=%s\n' "${resolved_context}" >> "$GITHUB_OUTPUT"
          printf 'dockerfile=%s\n' "${resolved_dockerfile}" >> "$GITHUB_OUTPUT"

      - name: Validate image coordinates
        id: validate_image
        run: |
          set -euo pipefail
          # Keep Docker Hub coordinates strict to prevent unsafe injection into downstream commands.
          [[ "${DOCKER_ORG}" =~ ^[a-z0-9._-]+$ ]] || { echo "::error::Invalid docker_org: ${DOCKER_ORG}"; exit 1; }
          [[ "${DOCKER_REPO}" =~ ^[a-z0-9._/-]+$ ]] || { echo "::error::Invalid docker_repo: ${DOCKER_REPO}"; exit 1; }
          echo "image_ref=${DOCKER_ORG}/${DOCKER_REPO}" >> "$GITHUB_OUTPUT"

      - name: Push Image
        id: build
        env:
          BUILD_CONTEXT: ${{ steps.validate_build_paths.outputs.context }}
          BUILD_DOCKERFILE: ${{ steps.validate_build_paths.outputs.dockerfile }}
          IMAGE_REF: ${{ steps.validate_image.outputs.image_ref }}
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r line; do
            [[ -n "${line}" ]] || continue
            build_args+=(--build-arg "${line}")
          done <<< "${BUILD_ARGS}"

          metadata_file="${RUNNER_TEMP}/build-arm64-metadata.json"
          docker buildx build \
            --platform linux/arm64 \
            --file "${BUILD_DOCKERFILE}" \
            --output "type=image,push-by-digest=true,name-canonical=true,push=true" \
            --tag "${IMAGE_REF}" \
            --sbom=true \
            --provenance=true \
            --no-cache \
            --metadata-file "${metadata_file}" \
            "${build_args[@]}" \
            "${BUILD_CONTEXT}"

          BUILD_DIGEST="$(jq -r '."containerimage.digest" // empty' "${metadata_file}")"
          [[ "${BUILD_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid build digest."; exit 1; }
          printf 'digest=%s\n' "${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "${BUILD_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid build digest."; exit 1; }
          mkdir -p /tmp/digests
          touch "/tmp/digests/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Log out
        run: docker logout

  manifest:
    runs-on: ubuntu-24.04
    needs: [config, github-release, build-amd64, build-arm64]
    if: |
      always() &&
      success() &&
      needs.config.outputs.docker_has_credentials == 'true' &&
      needs.config.outputs.docker_has_publish_config == 'true' &&
      needs.config.outputs.is_release_branch == 'true' &&
      needs.build-amd64.result == 'success' &&
      needs.build-arm64.result == 'success'
    permissions:
      contents: write
    env:
      DOCKER_LOGIN: ${{ needs.config.outputs.docker_login }}
      DOCKER_PASSWORD: ${{ secrets.docker_token }}
      DOCKER_ORG: ${{ needs.config.outputs.docker_org }}
      DOCKER_REPO: ${{ needs.config.outputs.docker_repo }}
      RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          cache-binary: ${{ needs.config.outputs.enable_cache == 'true' }}

      - name: Log in
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_LOGIN }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Prepare tags
        id: prepare_tags
        env:
          IMAGE_REF: ${{ needs.config.outputs.docker_org }}/${{ needs.config.outputs.docker_repo }}
          RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
        run: |
          set -euo pipefail
          echo "🔄 Preparing Docker Hub tags..."
          [[ "${IMAGE_REF}" =~ ^[a-z0-9._-]+/[a-z0-9._/-]+$ ]] || { echo "::error::Invalid Docker image reference."; exit 1; }
          [[ "${RELEASE_VERSION}" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::Invalid release_version: ${RELEASE_VERSION}"; exit 1; }
          # Keep existing release tag logic: semantic version + latest.
          TAGS="${IMAGE_REF}:${RELEASE_VERSION},${IMAGE_REF}:latest"
          echo "docker_tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "✅ Docker Hub tags prepared: $TAGS"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create Multi-Arch Manifest
        env:
          IMAGE_REF: ${{ needs.config.outputs.docker_org }}/${{ needs.config.outputs.docker_repo }}
          DOCKER_TAGS: ${{ steps.prepare_tags.outputs.docker_tags }}
        run: |
          set -euo pipefail
          [[ "${IMAGE_REF}" =~ ^[a-z0-9._-]+/[a-z0-9._/-]+$ ]] || { echo "::error::Invalid Docker image reference."; exit 1; }
          # Manifest creation only combines native per-arch digests, so no QEMU and no temp arch tags are required.
          DIGEST_SOURCES=()
          for digest_file in /tmp/digests/*; do
            [ -e "${digest_file}" ] || continue
            DIGEST_VALUE="$(basename "${digest_file}")"
            [[ "${DIGEST_VALUE}" =~ ^[a-f0-9]{64}$ ]] || { echo "::error::Invalid digest artifact: ${DIGEST_VALUE}"; exit 1; }
            DIGEST_SOURCES+=("${IMAGE_REF}@sha256:${DIGEST_VALUE}")
          done
          if [ ${#DIGEST_SOURCES[@]} -eq 0 ]; then
            echo "::error::No build digests found for manifest creation."
            exit 1
          fi

          IFS=',' read -ra TAG_ARRAY <<< "${DOCKER_TAGS}"
          for tag in "${TAG_ARRAY[@]}"; do
            [[ "${tag}" =~ ^[a-z0-9._/-]+:[A-Za-z0-9._-]+$ ]] || { echo "::error::Invalid Docker tag: ${tag}"; exit 1; }
            echo "🔄 Creating multi-arch manifest for ${tag}"
            docker buildx imagetools create \
              --tag "${tag}" \
              "${DIGEST_SOURCES[@]}"
            docker buildx imagetools inspect "${tag}"
          done

      - name: Log out
        run: docker logout

  google-cloud-release:
    runs-on: ubuntu-24.04

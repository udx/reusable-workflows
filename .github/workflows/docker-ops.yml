---
name: Docker Release

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name (lowercase, URL-safe)"
        required: true
        type: string
      gcp_region:
        description: "GCP: Region for Artifact Registry (Required if publishing to GCP)"
        required: false
        type: string
      gcp_project_id:
        description: "GCP: Project ID (Required if publishing to GCP)"
        required: false
        type: string
      gcp_repo:
        description: "GCP: Artifact Registry repository name (Required if publishing to GCP)"
        required: false
        type: string
      gcp_workload_identity_provider:
        description: "GCP: Workload Identity Provider (format: projects/NUM/locations/global/workloadIdentityPools/POOL/providers/PROV) (Required if publishing to GCP)"
        required: false
        type: string
      gcp_service_account:
        description: "GCP: Service Account email for Workload Identity Federation (Required if publishing to GCP)"
        required: false
        type: string
      acr_registry:
        description: "ACR: Registry name (e.g., myregistry.azurecr.io) (Required if publishing to ACR)"
        required: false
        type: string
      acr_repository:
        description: "ACR: Repository name (Required if publishing to ACR)"
        required: false
        type: string
      azure_client_id:
        description: "ACR: Azure Client ID for OIDC authentication (Required if publishing to ACR)"
        required: false
        type: string
      azure_tenant_id:
        description: "ACR: Azure Tenant ID for OIDC authentication (Required if publishing to ACR)"
        required: false
        type: string
      azure_subscription_id:
        description: "ACR: Azure Subscription ID for OIDC authentication (Required if publishing to ACR)"
        required: false
        type: string
      release_branch:
        description: "Branch name that triggers releases (default: latest)"
        required: false
        default: "latest"
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile (default: ./Dockerfile)"
        required: false
        default: "./Dockerfile"
        type: string
      working_directory:
        description: "Repository subdirectory containing the Docker build context, package.json, and changes.md (default: .)"
        required: false
        default: "."
        type: string
      build_platforms:
        description: "Platforms to build for (e.g., linux/amd64,linux/arm64). Note: multi-platform is primarily used for Docker Hub."
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      version_config_path:
        description: "Path to GitVersion config file (used if package.json NOT defined)"
        required: false
        default: "ci/git-version.yml"
        type: string
      build_args:
        description: "Additional build arguments in format ARG1=value1,ARG2=value2 (supports placeholders: {{version}}, {{branch}})"
        required: false
        default: ""
        type: string
      enable_security_scan:
        description: "Whether to perform a security scan with Trivy (default: true)"
        required: false
        default: "true"
        type: string
      enable_security_upload:
        description: "Whether to upload vulnerability scan results to GitHub Security (default: true, only on release branches)"
        required: false
        default: "true"
        type: string
      enable_sbom:
        description: "Whether to generate and upload SBOM in SPDX format (default: true)"
        required: false
        default: "true"
        type: string
      enable_cache:
        description: "Whether to allow GitHub Actions-backed caches for tools like Buildx and Trivy (default: true)"
        required: false
        default: "true"
        type: string
      docker_login:
        description: "Docker Hub: Username (Required if publishing to Docker Hub)"
        required: false
        type: string
      docker_org:
        description: "Docker Hub: Organization name (Required if publishing to Docker Hub)"
        required: false
        type: string
      docker_repo:
        description: "Docker Hub: Repository name (Required if publishing to Docker Hub)"
        required: false
        type: string
    secrets:
      docker_token:
        description: "Docker Hub: Token for authentication (Required if publishing to Docker Hub)"
        required: false
      slack_webhook_url:
        description: "Slack: Webhook URL for notifications (Optional, for release notifications)"
        required: false

jobs:
  config:
    runs-on: ubuntu-24.04
    outputs:
      # Version and branch information
      current_branch: ${{ steps.branches.outputs.branch_name }}
      is_release_branch: ${{ steps.branches.outputs.is_release_branch }}
      release_branch: ${{ steps.store_inputs.outputs.release_branch }}
      release_version: ${{ steps.set_version.outputs.version }}
      version_source: ${{ steps.set_version.outputs.version_source }}
      version_config_path: ${{ steps.validate_paths.outputs.version_config_path }}

      # Docker configuration
      docker_has_credentials: ${{ steps.extract_docker_creds.outputs.has_credentials }}
      docker_login: ${{ steps.extract_docker_creds.outputs.docker_login }}
      docker_has_publish_config: ${{ steps.extract_docker_publish_config.outputs.has_config }}
      docker_org: ${{ steps.extract_docker_publish_config.outputs.docker_org }}
      docker_repo: ${{ steps.extract_docker_publish_config.outputs.docker_repo }}

      # GCP configuration
      gcp_has_credentials: ${{ steps.extract_gcp_creds.outputs.has_credentials }}
      gcp_region: ${{ steps.extract_gcp_creds.outputs.gcp_region }}
      gcp_project_id: ${{ steps.extract_gcp_creds.outputs.gcp_project_id }}
      gcp_repo: ${{ steps.extract_gcp_creds.outputs.gcp_repo }}
      gcp_workload_identity_provider: ${{ steps.extract_gcp_creds.outputs.gcp_workload_identity_provider }}
      gcp_service_account: ${{ steps.extract_gcp_creds.outputs.gcp_service_account }}

      # ACR configuration
      acr_has_credentials: ${{ steps.extract_acr_creds.outputs.has_credentials }}
      acr_registry: ${{ steps.extract_acr_creds.outputs.acr_registry }}
      acr_repository: ${{ steps.extract_acr_creds.outputs.acr_repository }}
      azure_client_id: ${{ steps.extract_acr_creds.outputs.azure_client_id }}
      azure_tenant_id: ${{ steps.extract_acr_creds.outputs.azure_tenant_id }}
      azure_subscription_id: ${{ steps.extract_acr_creds.outputs.azure_subscription_id }}

      # Build configuration
      image_name: ${{ steps.store_inputs.outputs.image_name }}
      dockerfile_path: ${{ steps.validate_paths.outputs.dockerfile_path }}
      working_directory: ${{ steps.validate_paths.outputs.working_directory }}
      build_platforms: ${{ steps.store_inputs.outputs.build_platforms }}
      build_args: ${{ steps.parse_build_args.outputs.build_args }}

      # Notification configuration
      has_slack_webhook: ${{ steps.extract_slack_webhook.outputs.has_webhook }}

      # Security configuration
      enable_security_scan: ${{ steps.store_inputs.outputs.enable_security_scan }}
      enable_security_upload: ${{ steps.store_inputs.outputs.enable_security_upload }}
      enable_sbom: ${{ steps.store_inputs.outputs.enable_sbom }}
      enable_cache: ${{ steps.store_inputs.outputs.enable_cache }}

    steps:
      - name: Store inputs as outputs
        id: store_inputs
        env:
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_RELEASE_BRANCH: ${{ inputs.release_branch }}
          INPUT_DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
          INPUT_BUILD_PLATFORMS: ${{ inputs.build_platforms }}
          INPUT_VERSION_CONFIG_PATH: ${{ inputs.version_config_path }}
          INPUT_GCP_REGION: ${{ inputs.gcp_region }}
          INPUT_GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
          INPUT_GCP_REPO: ${{ inputs.gcp_repo }}
          INPUT_GCP_WIP: ${{ inputs.gcp_workload_identity_provider }}
          INPUT_GCP_SERVICE_ACCOUNT: ${{ inputs.gcp_service_account }}
          INPUT_ACR_REGISTRY: ${{ inputs.acr_registry }}
          INPUT_ACR_REPOSITORY: ${{ inputs.acr_repository }}
          INPUT_AZURE_CLIENT_ID: ${{ inputs.azure_client_id }}
          INPUT_AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
          INPUT_AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
          INPUT_ENABLE_SBOM: ${{ inputs.enable_sbom }}
          INPUT_ENABLE_SECURITY_SCAN: ${{ inputs.enable_security_scan }}
          INPUT_ENABLE_SECURITY_UPLOAD: ${{ inputs.enable_security_upload }}
          INPUT_ENABLE_CACHE: ${{ inputs.enable_cache }}
        run: |
          echo "🔄 Processing workflow inputs..."
          # Store all workflow inputs as outputs
          printf 'image_name=%s\n' "${INPUT_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          printf 'release_branch=%s\n' "${INPUT_RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          printf 'dockerfile_path=%s\n' "${INPUT_DOCKERFILE_PATH}" >> "$GITHUB_OUTPUT"
          printf 'working_directory=%s\n' "${INPUT_WORKING_DIRECTORY}" >> "$GITHUB_OUTPUT"
          printf 'build_platforms=%s\n' "${INPUT_BUILD_PLATFORMS}" >> "$GITHUB_OUTPUT"
          printf 'version_config_path=%s\n' "${INPUT_VERSION_CONFIG_PATH}" >> "$GITHUB_OUTPUT"

          # Store GCP inputs
          printf 'gcp_region=%s\n' "${INPUT_GCP_REGION}" >> "$GITHUB_OUTPUT"
          printf 'gcp_project_id=%s\n' "${INPUT_GCP_PROJECT_ID}" >> "$GITHUB_OUTPUT"
          printf 'gcp_repo=%s\n' "${INPUT_GCP_REPO}" >> "$GITHUB_OUTPUT"
          printf 'gcp_workload_identity_provider=%s\n' "${INPUT_GCP_WIP}" >> "$GITHUB_OUTPUT"
          printf 'gcp_service_account=%s\n' "${INPUT_GCP_SERVICE_ACCOUNT}" >> "$GITHUB_OUTPUT"

          # Store ACR inputs
          printf 'acr_registry=%s\n' "${INPUT_ACR_REGISTRY}" >> "$GITHUB_OUTPUT"
          printf 'acr_repository=%s\n' "${INPUT_ACR_REPOSITORY}" >> "$GITHUB_OUTPUT"

          # Store Azure OIDC inputs
          printf 'azure_client_id=%s\n' "${INPUT_AZURE_CLIENT_ID}" >> "$GITHUB_OUTPUT"
          printf 'azure_tenant_id=%s\n' "${INPUT_AZURE_TENANT_ID}" >> "$GITHUB_OUTPUT"
          printf 'azure_subscription_id=%s\n' "${INPUT_AZURE_SUBSCRIPTION_ID}" >> "$GITHUB_OUTPUT"

          # Store security upload setting
          printf 'enable_sbom=%s\n' "${INPUT_ENABLE_SBOM}" >> "$GITHUB_OUTPUT"
          printf 'enable_security_scan=%s\n' "${INPUT_ENABLE_SECURITY_SCAN}" >> "$GITHUB_OUTPUT"
          printf 'enable_security_upload=%s\n' "${INPUT_ENABLE_SECURITY_UPLOAD}" >> "$GITHUB_OUTPUT"
          printf 'enable_cache=%s\n' "${INPUT_ENABLE_CACHE}" >> "$GITHUB_OUTPUT"

          # Log stored inputs
          echo "✅ All workflow inputs stored as outputs"
          echo "📋 Image: ${INPUT_IMAGE_NAME}"
          echo "📋 Release branch: ${INPUT_RELEASE_BRANCH}"
          echo "📋 Dockerfile path: ${INPUT_DOCKERFILE_PATH}"
          echo "📋 Working directory: ${INPUT_WORKING_DIRECTORY}"

      - name: Validate paths
        id: validate_paths
        env:
          WORKING_DIRECTORY_INPUT: ${{ steps.store_inputs.outputs.working_directory }}
          DOCKERFILE_PATH_INPUT: ${{ steps.store_inputs.outputs.dockerfile_path }}
          VERSION_CONFIG_PATH_INPUT: ${{ steps.store_inputs.outputs.version_config_path }}
        run: |
          set -euo pipefail

          workspace_root="$(realpath "${GITHUB_WORKSPACE}")"
          wd="${WORKING_DIRECTORY_INPUT}"
          dockerfile_input="${DOCKERFILE_PATH_INPUT}"
          version_config_input="${VERSION_CONFIG_PATH_INPUT}"

          if [[ -z "${wd}" ]]; then
            wd="."
          fi

          resolved_wd="$(realpath -m "${GITHUB_WORKSPACE}/${wd}")"
          case "${resolved_wd}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *)
              echo "::error::working_directory must stay inside the repository: ${wd}"
              exit 1
              ;;
          esac

          if [[ ! -d "${resolved_wd}" ]]; then
            echo "::error::working_directory does not exist: ${wd}"
            exit 1
          fi

          wd_rel="${resolved_wd#"${workspace_root}/"}"
          if [[ "${resolved_wd}" == "${workspace_root}" ]]; then
            wd_rel="."
          fi

          if [[ -z "${dockerfile_input}" ]]; then
            dockerfile_input="./Dockerfile"
          fi

          if [[ "${dockerfile_input}" = /* ]]; then
            resolved_dockerfile="${dockerfile_input}"
          else
            resolved_dockerfile="$(realpath -m "${resolved_wd}/${dockerfile_input}")"
          fi
          case "${resolved_dockerfile}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *)
              echo "::error::dockerfile_path must stay inside the repository: ${dockerfile_input}"
              exit 1
              ;;
          esac

          if [[ ! -f "${resolved_dockerfile}" ]]; then
            echo "::error::Dockerfile not found: ${dockerfile_input} (resolved to ${resolved_dockerfile})"
            exit 1
          fi

          dockerfile_rel="${resolved_dockerfile#"${workspace_root}/"}"
          if [[ "${resolved_dockerfile}" == "${workspace_root}" ]]; then
            dockerfile_rel="."
          fi

          if [[ -n "${version_config_input}" ]]; then
            if [[ "${version_config_input}" = /* ]]; then
              resolved_version_config="${version_config_input}"
            else
              resolved_version_config="$(realpath -m "${GITHUB_WORKSPACE}/${version_config_input}")"
            fi
            case "${resolved_version_config}" in
              "${workspace_root}") ;;
              "${workspace_root}"/*) ;;
              *)
                echo "::error::version_config_path must stay inside the repository: ${version_config_input}"
                exit 1
                ;;
            esac

            version_config_rel="${resolved_version_config#"${workspace_root}/"}"
            if [[ "${resolved_version_config}" == "${workspace_root}" ]]; then
              version_config_rel="."
            fi
          else
            version_config_rel=""
          fi

          echo "working_directory=${wd_rel}" >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=${dockerfile_rel}" >> "$GITHUB_OUTPUT"
          echo "version_config_path=${version_config_rel}" >> "$GITHUB_OUTPUT"
          echo "✅ Path validation complete"
          echo "📁 Working directory: ${wd_rel}"
          echo "📄 Dockerfile: ${dockerfile_rel}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for package.json
        id: check_package_json
        env:
          WORKING_DIRECTORY: ${{ steps.validate_paths.outputs.working_directory }}
        run: |
          if [ -f "${WORKING_DIRECTORY}/package.json" ]; then
            echo "has_package_json=true" >> $GITHUB_OUTPUT
            echo "📦 Found package.json file in ${WORKING_DIRECTORY}"
          else
            echo "has_package_json=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No package.json file found in ${WORKING_DIRECTORY}"
          fi

      - name: Get version from package.json
        id: package_version
        if: steps.check_package_json.outputs.has_package_json == 'true'
        env:
          WORKING_DIRECTORY: ${{ steps.validate_paths.outputs.working_directory }}
        run: |
          echo "🔍 Extracting version from package.json..."
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Package.json version: $VERSION"
        working-directory: ${{ steps.validate_paths.outputs.working_directory }}

      - name: Determine version source
        id: check_version
        env:
          HAS_PACKAGE_JSON: ${{ steps.check_package_json.outputs.has_package_json }}
          PACKAGE_VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          if [ "${HAS_PACKAGE_JSON}" == "true" ]; then
            echo "use_gitversion=false" >> $GITHUB_OUTPUT
            echo "version_source=package.json" >> $GITHUB_OUTPUT
            echo "📋 Using version from package.json: ${PACKAGE_VERSION}"
          else
            echo "use_gitversion=true" >> $GITHUB_OUTPUT
            echo "version_source=gitversion" >> $GITHUB_OUTPUT
            echo "📋 Will determine version using GitVersion"
          fi

      - name: Install GitVersion
        if: steps.check_version.outputs.use_gitversion == 'true'
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.5.0"

      - name: Clear GitVersion Cache
        if: steps.check_version.outputs.use_gitversion == 'true'
        run: |
          rm -rf .git/gitversion_cache
          echo "GitVersion cache cleared."

      - name: Check if GitVersion config exists
        id: check_gitversion_config
        if: steps.check_version.outputs.use_gitversion == 'true'
        env:
          VERSION_CONFIG_PATH: ${{ steps.validate_paths.outputs.version_config_path }}
        run: |
          if [ -f "${VERSION_CONFIG_PATH}" ]; then
            echo "config_exists=true" >> $GITHUB_OUTPUT
            echo "GitVersion config file found at ${VERSION_CONFIG_PATH}."
          else
            echo "config_exists=false" >> $GITHUB_OUTPUT
            echo "::error:: GitVersion config file not found at ${VERSION_CONFIG_PATH}."
            exit 1
          fi

      - name: Determine Version
        id: gitversion
        if: steps.check_version.outputs.use_gitversion == 'true'
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: ${{ steps.validate_paths.outputs.version_config_path }}

      - name: Determine Branch Information
        id: branches
        shell: bash
        env:
          RELEASE_BRANCH_INPUT: ${{ steps.store_inputs.outputs.release_branch }}
        run: |
          echo "🔄 Analyzing branch information..."
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "📌 Current branch: ${BRANCH_NAME}"

          IS_RELEASE_BRANCH=$([[ "${BRANCH_NAME}" == "${RELEASE_BRANCH_INPUT}" ]] && echo "true" || echo "false")
          if [ "$IS_RELEASE_BRANCH" = "true" ]; then
            echo "✅ Branch matches release branch: ${RELEASE_BRANCH_INPUT}"
          else
            echo "⚠️ Branch does not match release branch: ${RELEASE_BRANCH_INPUT}"
          fi
          echo "is_release_branch=${IS_RELEASE_BRANCH}" >> $GITHUB_OUTPUT
          echo "✅ Branch analysis completed"

      - name: Set Version
        id: set_version
        env:
          USE_GITVERSION: ${{ steps.check_version.outputs.use_gitversion }}
          GITVERSION_SEMVER: ${{ steps.gitversion.outputs.semVer }}
          PACKAGE_VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          echo "🔄 Setting version..."
          if [ "${USE_GITVERSION}" == "true" ]; then
            # Get version from GitVersion
            VERSION="${GITVERSION_SEMVER}"
            VERSION_SOURCE="GitVersion"
          else
            # Get version from package.json
            VERSION="${PACKAGE_VERSION}"
            VERSION_SOURCE="package.json"
          fi

          # Set standard outputs regardless of version source
          echo "🏷️ Version determined: ${VERSION} (${VERSION_SOURCE})"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_source=${VERSION_SOURCE}" >> $GITHUB_OUTPUT
          echo "✅ Version set successfully"

      - name: Extract Docker Hub Credentials
        id: extract_docker_creds
        env:
          DOCKER_TOKEN_INPUT: ${{ secrets.docker_token }}
          DOCKER_LOGIN_INPUT: ${{ inputs.docker_login }}
        run: |
          echo "🔄 Checking Docker Hub credentials..."
          # Store Docker Hub credentials securely
          DOCKER_TOKEN="${DOCKER_TOKEN_INPUT}"
          DOCKER_LOGIN="${DOCKER_LOGIN_INPUT}"

          echo "docker_login=${DOCKER_LOGIN}" >> $GITHUB_OUTPUT

          if [ -n "${DOCKER_TOKEN}" ] && [ -n "${DOCKER_LOGIN}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "✅ Docker Hub credentials found"
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "⚠️ Docker Hub credentials not found"
          fi

      - name: Extract Docker Hub Publishing Config
        id: extract_docker_publish_config
        env:
          DOCKER_ORG_INPUT: ${{ inputs.docker_org }}
          DOCKER_REPO_INPUT: ${{ inputs.docker_repo }}
        run: |
          echo "🔄 Checking Docker Hub publishing configuration..."
          # Store Docker Hub publishing config
          DOCKER_ORG="${DOCKER_ORG_INPUT}"
          DOCKER_REPO="${DOCKER_REPO_INPUT}"

          if [ -n "${DOCKER_ORG}" ] && [ -n "${DOCKER_REPO}" ]; then
            echo "has_config=true" >> $GITHUB_OUTPUT
            echo "docker_org=${DOCKER_ORG}" >> $GITHUB_OUTPUT
            echo "docker_repo=${DOCKER_REPO}" >> $GITHUB_OUTPUT
            echo "✅ Docker Hub publishing config found"
          else
            echo "has_config=false" >> $GITHUB_OUTPUT
            echo "⚠️ Docker Hub publishing config not found (both docker_org and docker_repo required)"
          fi

      - name: Extract and Check GCP Credentials
        id: extract_gcp_creds
        env:
          GCP_REGION_INPUT: ${{ steps.store_inputs.outputs.gcp_region }}
          GCP_PROJECT_ID_INPUT: ${{ steps.store_inputs.outputs.gcp_project_id }}
          GCP_REPO_INPUT: ${{ steps.store_inputs.outputs.gcp_repo }}
          GCP_WI_PROVIDER_INPUT: ${{ steps.store_inputs.outputs.gcp_workload_identity_provider }}
          GCP_SERVICE_ACCOUNT_INPUT: ${{ steps.store_inputs.outputs.gcp_service_account }}
        run: |
          echo "🔄 Checking GCP Workload Identity configuration..."
          # Get inputs from store_inputs step
          GCP_REGION="${GCP_REGION_INPUT}"
          GCP_PROJECT_ID="${GCP_PROJECT_ID_INPUT}"
          GCP_REPO="${GCP_REPO_INPUT}"
          GCP_WI_PROVIDER="${GCP_WI_PROVIDER_INPUT}"
          GCP_SERVICE_ACCOUNT="${GCP_SERVICE_ACCOUNT_INPUT}"

          # Define parameter map for validation
          declare -A params=(
            [gcp_region]="$GCP_REGION"
            [gcp_project_id]="$GCP_PROJECT_ID"
            [gcp_repo]="$GCP_REPO"
            [gcp_workload_identity_provider]="$GCP_WI_PROVIDER"
            [gcp_service_account]="$GCP_SERVICE_ACCOUNT"
          )

          # Initialize variables
          ALL_PARAMS_SET=true
          MISSING_PARAMS=""

          # Check each parameter
          for param in "${!params[@]}"; do
            if [ -n "${params[$param]}" ]; then
              # Parameter is set, add to output
              echo "$param=${params[$param]}" >> $GITHUB_OUTPUT
              echo "ℹ️ GCP $param: ${params[$param]}"
            else
              # Parameter is missing
              ALL_PARAMS_SET=false
              MISSING_PARAMS="$MISSING_PARAMS $param,"
            fi
          done

          # Set has_credentials output
          if [ "$ALL_PARAMS_SET" = true ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "✅ GCP Workload Identity configuration complete"
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "⚠️ Missing GCP parameters:${MISSING_PARAMS%,}"
          fi

      - name: Extract and Check ACR Credentials
        id: extract_acr_creds
        env:
          ACR_REGISTRY_INPUT: ${{ steps.store_inputs.outputs.acr_registry }}
          ACR_REPOSITORY_INPUT: ${{ steps.store_inputs.outputs.acr_repository }}
          AZURE_CLIENT_ID_INPUT: ${{ steps.store_inputs.outputs.azure_client_id }}
          AZURE_TENANT_ID_INPUT: ${{ steps.store_inputs.outputs.azure_tenant_id }}
          AZURE_SUBSCRIPTION_ID_INPUT: ${{ steps.store_inputs.outputs.azure_subscription_id }}
        run: |
          echo "🔄 Checking ACR credentials and configuration..."
          # Get inputs from store_inputs step
          ACR_REGISTRY="${ACR_REGISTRY_INPUT}"
          ACR_REPOSITORY="${ACR_REPOSITORY_INPUT}"
          AZURE_CLIENT_ID="${AZURE_CLIENT_ID_INPUT}"
          AZURE_TENANT_ID="${AZURE_TENANT_ID_INPUT}"
          AZURE_SUBSCRIPTION_ID="${AZURE_SUBSCRIPTION_ID_INPUT}"

          # Define parameter map for validation
          declare -A params=(
            [acr_registry]="$ACR_REGISTRY"
            [acr_repository]="$ACR_REPOSITORY"
            [azure_client_id]="$AZURE_CLIENT_ID"
            [azure_tenant_id]="$AZURE_TENANT_ID"
            [azure_subscription_id]="$AZURE_SUBSCRIPTION_ID"
          )

          # Initialize variables
          ALL_PARAMS_SET=true
          MISSING_PARAMS=""

          # Check each parameter
          for param in "${!params[@]}"; do
            if [ -n "${params[$param]}" ]; then
              # Parameter is set, add to output
              echo "$param=${params[$param]}" >> $GITHUB_OUTPUT
              echo "ℹ️ ACR $param: ${params[$param]}"
            else
              # Parameter is missing
              ALL_PARAMS_SET=false
              MISSING_PARAMS="$MISSING_PARAMS $param,"
            fi
          done

          # Set has_credentials output
          if [ "$ALL_PARAMS_SET" = true ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "✅ ACR credentials and configuration complete"
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "⚠️ Missing ACR parameters:${MISSING_PARAMS%,}"
          fi

      - name: Extract and Check Slack Webhook
        id: extract_slack_webhook
        env:
          SLACK_WEBHOOK_INPUT: ${{ secrets.slack_webhook_url }}
        run: |
          echo "🔄 Checking Slack webhook..."
          SLACK_WEBHOOK="${SLACK_WEBHOOK_INPUT}"
          if [ -n "${SLACK_WEBHOOK}" ]; then
            echo "has_webhook=true" >> $GITHUB_OUTPUT
            echo "✅ Slack webhook found"
          else
            echo "has_webhook=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Slack webhook not configured"
          fi

      - name: Parse build arguments
        id: parse_build_args
        env:
          BUILD_ARGS_INPUT: ${{ inputs.build_args }}
          RELEASE_VERSION_INPUT: ${{ steps.set_version.outputs.version }}
          BRANCH_NAME_INPUT: ${{ steps.branches.outputs.branch_name }}
        run: |
          echo "🔄 Processing build arguments..."
          # Get build args from inputs
          RELEASE_VERSION="${RELEASE_VERSION_INPUT}"
          BRANCH_NAME="${BRANCH_NAME_INPUT}"

          # Process user-provided build args
          if [ -n "${BUILD_ARGS_INPUT}" ]; then
            # Convert comma-separated args to newline-separated for build-args format
            BUILD_ARGS_TEMP=$(echo "${BUILD_ARGS_INPUT}" | tr ',' '\n')
            
            # Process placeholders
            echo "🔄 Processing placeholders in build arguments..."
            BUILD_ARGS=""
            while IFS= read -r line; do
              # Replace {{version}} with actual version
              line=$(echo "$line" | sed "s/{{version}}/$RELEASE_VERSION/g")
              # Replace {{branch}} with branch name
              line=$(echo "$line" | sed "s/{{branch}}/$BRANCH_NAME/g")
              # Add more placeholder replacements as needed
              
              BUILD_ARGS="${BUILD_ARGS}${line}\n"
            done <<< "$BUILD_ARGS_TEMP"
            
            # Store in output
            echo "build_args<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BUILD_ARGS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "✅ Build arguments processed with placeholders: ${BUILD_ARGS_INPUT}"
          else
            # No build args provided
            echo "build_args=" >> $GITHUB_OUTPUT
            echo "ℹ️ No build arguments provided"
          fi

      - name: Summarize Configuration
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
          VERSION_SOURCE: ${{ steps.set_version.outputs.version_source }}
          IMAGE_NAME_INPUT: ${{ steps.store_inputs.outputs.image_name }}
          DOCKERFILE_PATH_INPUT: ${{ steps.validate_paths.outputs.dockerfile_path }}
          WORKING_DIRECTORY_INPUT: ${{ steps.validate_paths.outputs.working_directory }}
          BUILD_PLATFORMS_INPUT: ${{ steps.store_inputs.outputs.build_platforms }}
          BRANCH_NAME_INPUT: ${{ steps.branches.outputs.branch_name }}
          RELEASE_BRANCH_INPUT: ${{ steps.store_inputs.outputs.release_branch }}
          IS_RELEASE_BRANCH_INPUT: ${{ steps.branches.outputs.is_release_branch }}
          EVENT_NAME_INPUT: ${{ github.event_name }}
          DOCKER_HAS_CREDENTIALS_INPUT: ${{ steps.extract_docker_creds.outputs.has_credentials }}
          DOCKER_HAS_CONFIG_INPUT: ${{ steps.extract_docker_publish_config.outputs.has_config }}
          GCP_HAS_CREDENTIALS_INPUT: ${{ steps.extract_gcp_creds.outputs.has_credentials }}
          ACR_HAS_CREDENTIALS_INPUT: ${{ steps.extract_acr_creds.outputs.has_credentials }}
          HAS_SLACK_WEBHOOK_INPUT: ${{ steps.extract_slack_webhook.outputs.has_webhook }}
          ENABLE_SECURITY_SCAN_INPUT: ${{ steps.store_inputs.outputs.enable_security_scan }}
          ENABLE_SECURITY_UPLOAD_INPUT: ${{ steps.store_inputs.outputs.enable_security_upload }}
          ENABLE_CACHE_INPUT: ${{ steps.store_inputs.outputs.enable_cache }}
        run: |
          echo "📋 Build Configuration Summary"
          echo "----------------------------"
          RELEASE_BRANCH_STATUS="✗ not matched"
          DOCKER_PULL_STATUS="❌ disabled"
          DOCKER_PUBLISH_STATUS="❌ disabled"
          GCP_STATUS="❌ disabled"
          ACR_STATUS="❌ disabled"
          SLACK_STATUS="❌ disabled"
          SECURITY_SCAN_STATUS="❌ disabled"
          SECURITY_UPLOAD_STATUS="❌ disabled"
          WORKFLOW_CACHE_STATUS="❌ disabled"

          if [[ "${IS_RELEASE_BRANCH_INPUT}" == "true" ]]; then
            RELEASE_BRANCH_STATUS="✓ matched"
          fi
          if [[ "${DOCKER_HAS_CREDENTIALS_INPUT}" == "true" ]]; then
            DOCKER_PULL_STATUS="✅ enabled"
          fi
          if [[ "${DOCKER_HAS_CREDENTIALS_INPUT}" == "true" && "${DOCKER_HAS_CONFIG_INPUT}" == "true" ]]; then
            DOCKER_PUBLISH_STATUS="✅ enabled"
          fi
          if [[ "${GCP_HAS_CREDENTIALS_INPUT}" == "true" ]]; then
            GCP_STATUS="✅ enabled"
          fi
          if [[ "${ACR_HAS_CREDENTIALS_INPUT}" == "true" ]]; then
            ACR_STATUS="✅ enabled"
          fi
          if [[ "${HAS_SLACK_WEBHOOK_INPUT}" == "true" ]]; then
            SLACK_STATUS="✅ enabled"
          fi
          if [[ "${ENABLE_SECURITY_SCAN_INPUT}" == "true" ]]; then
            SECURITY_SCAN_STATUS="✅ enabled"
          fi
          if [[ "${ENABLE_SECURITY_UPLOAD_INPUT}" == "true" ]]; then
            SECURITY_UPLOAD_STATUS="✅ enabled"
          fi
          if [[ "${ENABLE_CACHE_INPUT}" == "true" ]]; then
            WORKFLOW_CACHE_STATUS="✅ enabled"
          fi

          echo "🏷️ Version: ${VERSION} (Source: ${VERSION_SOURCE})"
          echo "🔄 Image: ${IMAGE_NAME_INPUT}"
          echo "📁 Working directory: ${WORKING_DIRECTORY_INPUT}"
          echo "📄 Dockerfile: ${DOCKERFILE_PATH_INPUT}"
          echo "🌐 Platforms: ${BUILD_PLATFORMS_INPUT}"
          echo "🔖 Branch: ${BRANCH_NAME_INPUT}"
          echo "🚀 Release Branch: ${RELEASE_BRANCH_INPUT} (${RELEASE_BRANCH_STATUS})"
          echo "🔄 Trigger: ${EVENT_NAME_INPUT}"
          echo ""
          echo "📦 Distribution Channels"
          echo "----------------------------"
          echo "🐳 Docker Hub Pulling: ${DOCKER_PULL_STATUS}"
          echo "🐳 Docker Hub Publishing: ${DOCKER_PUBLISH_STATUS}"
          echo "☁️ Google Cloud: ${GCP_STATUS}"
          echo "💠 Azure Container Registry: ${ACR_STATUS}"
          echo ""
          echo "⚙️ Workflow Execution Plan"
          echo "----------------------------"
          echo "🔍 Build & Scan: ✅ Always runs"

          # GitHub Release - only on release branches
          if [[ "${IS_RELEASE_BRANCH_INPUT}" == "true" ]]; then
            echo "📦 GitHub Release: ✅ Will run (release branch)"
          else
            echo "📦 GitHub Release: ❌ Will not run (not a release branch)"
          fi

          # Docker Hub Release - only on release branches with credentials
          if [[ "${IS_RELEASE_BRANCH_INPUT}" == "true" && \
                "${DOCKER_HAS_CREDENTIALS_INPUT}" == "true" && \
                "${DOCKER_HAS_CONFIG_INPUT}" == "true" ]]; then
            echo "🐳 Docker Hub Release: ✅ Will run (release branch with credentials)"
          else
            echo "🐳 Docker Hub Release: ❌ Will not run"
          fi

          # GCP Release - on release branches or manual trigger with credentials
          if [[ ("${IS_RELEASE_BRANCH_INPUT}" == "true" || \
                "${EVENT_NAME_INPUT}" == "workflow_dispatch") && \
                "${GCP_HAS_CREDENTIALS_INPUT}" == "true" ]]; then
            echo "☁️ GCP Release: ✅ Will run"
          else
            echo "☁️ GCP Release: ❌ Will not run"
          fi

          # ACR Release - on release branches or manual trigger with credentials
          if [[ ("${IS_RELEASE_BRANCH_INPUT}" == "true" || \
                "${EVENT_NAME_INPUT}" == "workflow_dispatch") && \
                "${ACR_HAS_CREDENTIALS_INPUT}" == "true" ]]; then
            echo "💠 ACR Release: ✅ Will run"
          else
            echo "💠 ACR Release: ❌ Will not run"
          fi

          # Slack Notification - only on release branches with webhook
          if [[ "${IS_RELEASE_BRANCH_INPUT}" == "true" && \
                "${HAS_SLACK_WEBHOOK_INPUT}" == "true" ]]; then
            echo "📢 Slack Notification: ✅ Will run (release branch with webhook)"
          else
            echo "📢 Slack Notification: ❌ Will not run"
          fi

          echo ""
          echo "Additional Configurations"
          echo "----------------------------"
          echo "Slack Webhook: ${SLACK_STATUS}"
          echo "Security Scan: ${SECURITY_SCAN_STATUS}"
          echo "Security Upload: ${SECURITY_UPLOAD_STATUS}"
          echo "Workflow Cache: ${WORKFLOW_CACHE_STATUS}"
          echo ""

  control-gate:
    runs-on: ubuntu-24.04
    needs: [config]
    if: always() && success()
    env:
      RELEASE_BRANCH: ${{ needs.config.outputs.release_branch }}
      CURRENT_BRANCH: ${{ needs.config.outputs.current_branch }}
    steps:
      - name: Release branch protection
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "Checking workflow event type..."

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Event: workflow_dispatch (manual trigger)"
            echo "Checking if branch is release branch..."
            
            if [[ "${CURRENT_BRANCH}" == "${RELEASE_BRANCH}" ]]; then
              echo "::error:: Branch: ${RELEASE_BRANCH} (release branch). Stopping workflow."
              exit 1
            else
              echo "Branch: ${CURRENT_BRANCH} (not release branch). Proceeding with workflow."
            fi
          else
            echo "Event: ${EVENT_NAME} (not manual trigger). Proceeding with workflow."
          fi

  build-and-scan:
    runs-on: ubuntu-24.04
    needs: [config, control-gate]
    if: needs.control-gate.result == 'success' || needs.control-gate.result == 'skipped'
    env:
      IMAGE_NAME: ${{ needs.config.outputs.image_name }}
      DOCKERFILE_PATH: ${{ needs.config.outputs.dockerfile_path }}
      WORKING_DIRECTORY: ${{ needs.config.outputs.working_directory }}
      RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
      BUILD_ARGS: ${{ needs.config.outputs.build_args }}
      ENABLE_SECURITY_SCAN: ${{ needs.config.outputs.enable_security_scan }}
      ENABLE_SECURITY_UPLOAD: ${{ needs.config.outputs.enable_security_upload }}
      ENABLE_SBOM: ${{ needs.config.outputs.enable_sbom }}
      ENABLE_CACHE: ${{ needs.config.outputs.enable_cache }}
      DOCKER_HAS_CREDENTIALS: ${{ needs.config.outputs.docker_has_credentials }}
      DOCKER_LOGIN: ${{ needs.config.outputs.docker_login }}
      DOCKER_TOKEN: ${{ secrets.docker_token }}
      IS_RELEASE_BRANCH: ${{ needs.config.outputs.is_release_branch }}
    steps:
      # Delete huge unnecessary tools folder to save space needed for docker build
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          cache-binary: ${{ env.ENABLE_CACHE == 'true' }}

      - name: Log in to Docker Hub
        if: env.DOCKER_HAS_CREDENTIALS == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_LOGIN }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Validate build paths
        id: validate_build_paths
        env:
          WORKING_DIRECTORY_INPUT: ${{ env.WORKING_DIRECTORY }}
          DOCKERFILE_PATH_INPUT: ${{ env.DOCKERFILE_PATH }}
        run: |
          set -euo pipefail
          workspace_root="$(realpath "${GITHUB_WORKSPACE}")"
          resolved_context="$(realpath -m "${GITHUB_WORKSPACE}/${WORKING_DIRECTORY_INPUT}")"
          resolved_dockerfile="$(realpath -m "${GITHUB_WORKSPACE}/${DOCKERFILE_PATH_INPUT}")"

          case "${resolved_context}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid build context path: ${WORKING_DIRECTORY_INPUT}"; exit 1 ;;
          esac
          case "${resolved_dockerfile}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid Dockerfile path: ${DOCKERFILE_PATH_INPUT}"; exit 1 ;;
          esac

          [[ -d "${resolved_context}" ]] || { echo "::error::Build context directory not found: ${WORKING_DIRECTORY_INPUT}"; exit 1; }
          [[ -f "${resolved_dockerfile}" ]] || { echo "::error::Dockerfile not found: ${DOCKERFILE_PATH_INPUT}"; exit 1; }

          printf 'context=%s\n' "${resolved_context}" >> "$GITHUB_OUTPUT"
          printf 'dockerfile=%s\n' "${resolved_dockerfile}" >> "$GITHUB_OUTPUT"

      - name: Test Build
        env:
          BUILD_CONTEXT: ${{ steps.validate_build_paths.outputs.context }}
          BUILD_DOCKERFILE: ${{ steps.validate_build_paths.outputs.dockerfile }}
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r line; do
            [[ -n "${line}" ]] || continue
            build_args+=(--build-arg "${line}")
          done <<< "${BUILD_ARGS}"

          docker buildx build \
            --platform linux/amd64 \
            --file "${BUILD_DOCKERFILE}" \
            --tag "${IMAGE_NAME}:${RELEASE_VERSION}" \
            "${build_args[@]}" \
            "${BUILD_CONTEXT}"

      - name: Single Arch Build Load
        env:
          BUILD_CONTEXT: ${{ steps.validate_build_paths.outputs.context }}
          BUILD_DOCKERFILE: ${{ steps.validate_build_paths.outputs.dockerfile }}
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r line; do
            [[ -n "${line}" ]] || continue
            build_args+=(--build-arg "${line}")
          done <<< "${BUILD_ARGS}"

          docker buildx build \
            --platform linux/amd64 \
            --file "${BUILD_DOCKERFILE}" \
            --tag "${IMAGE_NAME}:${RELEASE_VERSION}" \
            --load \
            "${build_args[@]}" \
            "${BUILD_CONTEXT}"

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sudo sh -s -- -b /usr/local/bin
          echo "✅ Trivy installed successfully"

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Generate SBOM with Retry Logic
        id: generate-sbom
        if: env.ENABLE_SBOM == 'true'
        run: |
          export TRIVY_DISABLE_VEX_NOTICE=true
          IMAGE_REF="${IMAGE_NAME}:${RELEASE_VERSION}"
          max_retries=5
          attempt=1
          success=false
          while [ $attempt -le $max_retries ]; do
            echo "🔄 Generating SBOM, attempt $attempt..."
            trivy image --format spdx-json --output sbom.json "${IMAGE_REF}"
            if [ $? -eq 0 ]; then
              echo "✅ SBOM generation successful"
              success=true
              break
            else
              echo "⚠️ Retry in 60 seconds..."
              sleep 60
              attempt=$((attempt+1))
            fi
          done
          if [ "$success" = false ]; then
            echo "❌ SBOM generation failed after $max_retries attempts"
            exit 1
          fi

      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        if: ${{ env.ENABLE_SECURITY_SCAN != 'false' }}
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}"
          cache: ${{ env.ENABLE_CACHE == 'true' }}
          exit-code: "0"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Vulnerability Scan Results
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ env.ENABLE_SECURITY_SCAN != 'false' && env.ENABLE_SECURITY_UPLOAD != 'false' && env.IS_RELEASE_BRANCH == 'true' }}
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v7
        if: env.ENABLE_SBOM == 'true'
        with:
          name: sbom
          path: sbom.json
          retention-days: 1

  github-release:
    runs-on: ubuntu-24.04
    needs: [config, build-and-scan]
    if: |
      always() &&
      success() &&
      needs.config.outputs.is_release_branch == 'true'
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
      IS_RELEASE_BRANCH: ${{ needs.config.outputs.is_release_branch }}
      ENABLE_SBOM: ${{ needs.config.outputs.enable_sbom }}
      WORKING_DIRECTORY: ${{ needs.config.outputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download SBOM Artifact
        if: env.ENABLE_SBOM == 'true'
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: ./

      - name: Check for changes.md
        id: check_changelog
        run: |
          if [ -f "${WORKING_DIRECTORY}/changes.md" ]; then
            echo "has_changelog=true" >> $GITHUB_OUTPUT
            echo "📖 Found changes.md file in ${WORKING_DIRECTORY}"
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes.md file found in ${WORKING_DIRECTORY}, will generate changelog from git history"
          fi

      - name: Parse Changelog from changes.md
        id: parse_changelog
        if: steps.check_changelog.outputs.has_changelog == 'true'
        uses: actions/github-script@v8
        env:
          RELEASE_VERSION_INPUT: ${{ env.RELEASE_VERSION }}
          WORKING_DIRECTORY_INPUT: ${{ env.WORKING_DIRECTORY }}
        with:
          script: |
            const { open } = require('fs/promises');
            const fs = require('fs');

            const version = process.env.RELEASE_VERSION_INPUT;
            const workingDirectory = process.env.WORKING_DIRECTORY_INPUT;
            const delimiter = '### ';
            const file = await open(`${workingDirectory}/changes.md`);

            let description = [];
            let found = false;

            for await (let line of file.readLines()) {
              line = line.trim();

              if (line.startsWith(`${delimiter}${version}`)) {
                found = true;
                continue;
              }

              if (!found) continue;
              if (line.startsWith(delimiter)) break;

              description.push(line);
            }

            if (description.length) {
              const content = description.join('\n');
              fs.writeFileSync('changelog.txt', content);
              core.setOutput('has_description', 'true');
              console.log(`✅ Found changelog entry for version ${version}`);
            } else {
              core.setOutput('has_description', 'false');
              console.log(`⚠️ No changelog entry found for version ${version}`);
            }

      - name: Generate Changelog from Git History
        id: git_changelog
        if: steps.check_changelog.outputs.has_changelog != 'true' || steps.parse_changelog.outputs.has_description != 'true'
        run: |
          echo "🔄 Generating changelog from git history..."

          # Check if this is the first tag
          if [ "$(git tag | wc -l)" -eq "0" ]; then
            echo "ℹ️ This is the first tag, using all commits"
            REFERENCE=""
          else
            # Get the most recent tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -z "$LAST_TAG" ]; then
              echo "ℹ️ No previous tags found, using all commits"
              REFERENCE=""
            else
              echo "ℹ️ Using commits since $LAST_TAG"
              REFERENCE=$LAST_TAG
            fi
          fi

          # Generate changelog with simple formatting - no header
          # Get commits since last tag (just the commit message without hash)
          # Exclude merge commits
          git log $REFERENCE..HEAD --no-merges --pretty=format:"- %s" > changelog.txt

          # Check if changelog is empty
          if [ ! -s changelog.txt ]; then
            echo "ℹ️ No changes found, adding placeholder"
            echo "- Initial release" > changelog.txt
          fi

          echo "✅ Changelog generated from git history"

      - name: Configure Git for Tagging
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Create GitHub Tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git tag "${RELEASE_VERSION}"
          git push origin "${RELEASE_VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          body_path: changelog.txt
          prerelease: ${{ env.IS_RELEASE_BRANCH != 'true' }}
          files: ${{ env.ENABLE_SBOM == 'true' && 'sbom.json' || '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-amd64:
    runs-on: ubuntu-24.04
    needs: [config, github-release]
    if: |
      always() &&
      success() &&
      needs.config.outputs.docker_has_credentials == 'true' &&
      needs.config.outputs.docker_has_publish_config == 'true' &&
      needs.config.outputs.is_release_branch == 'true'
    permissions:
      contents: write
    env:
      DOCKER_LOGIN: ${{ needs.config.outputs.docker_login }}
      DOCKER_PASSWORD: ${{ secrets.docker_token }}
      DOCKER_ORG: ${{ needs.config.outputs.docker_org }}
      DOCKER_REPO: ${{ needs.config.outputs.docker_repo }}
      RELEASE_VERSION: ${{ needs.config.outputs.release_version }}
      DOCKERFILE_PATH: ${{ needs.config.outputs.dockerfile_path }}
      WORKING_DIRECTORY: ${{ needs.config.outputs.working_directory }}
      BUILD_ARGS: ${{ needs.config.outputs.build_args }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          cache-binary: ${{ needs.config.outputs.enable_cache == 'true' }}

      - name: Log in
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_LOGIN }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Validate build paths
        id: validate_build_paths
        env:
          WORKING_DIRECTORY_INPUT: ${{ env.WORKING_DIRECTORY }}
          DOCKERFILE_PATH_INPUT: ${{ env.DOCKERFILE_PATH }}
        run: |
          set -euo pipefail
          workspace_root="$(realpath "${GITHUB_WORKSPACE}")"
          resolved_context="$(realpath -m "${GITHUB_WORKSPACE}/${WORKING_DIRECTORY_INPUT}")"
          resolved_dockerfile="$(realpath -m "${GITHUB_WORKSPACE}/${DOCKERFILE_PATH_INPUT}")"

          case "${resolved_context}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid build context path: ${WORKING_DIRECTORY_INPUT}"; exit 1 ;;
          esac
          case "${resolved_dockerfile}" in
            "${workspace_root}") ;;
            "${workspace_root}"/*) ;;
            *) echo "::error::Invalid Dockerfile path: ${DOCKERFILE_PATH_INPUT}"; exit 1 ;;
          esac

          [[ -d "${resolved_context}" ]] || { echo "::error::Build context directory not found: ${WORKING_DIRECTORY_INPUT}"; exit 1; }
          [[ -f "${resolved_dockerfile}" ]] || { echo "::error::Dockerfile not found: ${DOCKERFILE_PATH_INPUT}"; exit 1; }

          printf 'context=%s\n' "${resolved_context}" >> "$GITHUB_OUTPUT"
          printf 'dockerfile=%s\n' "${resolved_dockerfile}" >> "$GITHUB_OUTPUT"

      - name: Validate image coordinates
        id: validate_image
        run: |
          set -euo pipefail
          # Keep Docker Hub coordinates strict to prevent unsafe injection into downstream commands.
          [[ "${DOCKER_ORG}" =~ ^[a-z0-9._-]+$ ]] || { echo "::error::Invalid docker_org: ${DOCKER_ORG}"; exit 1; }
          [[ "${DOCKER_REPO}" =~ ^[a-z0-9._/-]+$ ]] || { echo "::error::Invalid docker_repo: ${DOCKER_REPO}"; exit 1; }
          echo "image_ref=${DOCKER_ORG}/${DOCKER_REPO}" >> "$GITHUB_OUTPUT"

      - name: Push Image
        id: build
        env:
          BUILD_CONTEXT: ${{ steps.validate_build_paths.outputs.context }}
          BUILD_DOCKERFILE: ${{ steps.validate_build_paths.outputs.dockerfile }}
          IMAGE_REF: ${{ steps.validate_image.outputs.image_ref }}
        run: |
          set -euo pipefail

          build_args=()
          while IFS= read -r line; do
            [[ -n "${line}" ]] || continue
            build_args+=(--build-arg "${line}")
          done <<< "${BUILD_ARGS}"

          metadata_file="${RUNNER_TEMP}/build-amd64-metadata.json"
          docker buildx build \
            --platform linux/amd64 \
            --file "${BUILD_DOCKERFILE}" \
            --output "type=image,push-by-digest=true,name-canonical=true,push=true" \
            --tag "${IMAGE_REF}" \
            --sbom=true \
            --provenance=true \
            --no-cache \
            --metadata-file "${metadata_file}" \
            "${build_args[@]}" \
            "${BUILD_CONTEXT}"

          BUILD_DIGEST="$(jq -r '."containerimage.digest" // empty' "${metadata_file}")"
          [[ "${BUILD_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid build digest."; exit 1; }
          printf 'digest=%s\n' "${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "${BUILD_DIGEST}" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "::error::Invalid build digest."; exit 1; }
          mkdir -p /tmp/digests
          touch "/tmp/digests/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:

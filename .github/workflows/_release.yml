name: _release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch, tag, or commit to release (manual only; master is not allowed)"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark GitHub release as prerelease (recommended for non-master/manual releases)"
        required: false
        default: true
        type: boolean
      draft:
        description: "Create GitHub release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      previous_tag: ${{ steps.resolve.outputs.previous_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      draft: ${{ steps.resolve.outputs.draft }}
    steps:
      - name: Resolve checkout ref
        id: checkout_ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_TARGET_REF}" ]; then
              echo "value=${INPUT_TARGET_REF}" >> "${GITHUB_OUTPUT}"
            else
              echo "value=${GITHUB_REF_NAME_VALUE}" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "value=${GITHUB_SHA_VALUE}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.checkout_ref.outputs.value }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: "6.1.0"

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3
        with:
          configFilePath: ci/git-version.yml

      - name: Resolve and validate release config
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET_REF: ${{ inputs.target_ref }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_DRAFT: ${{ inputs.draft }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
          GITVERSION_SEMVER: ${{ steps.gitversion.outputs.semVer }}
        run: |
          set -euo pipefail

          TARGET_SHA=$(git rev-parse --verify HEAD)
          git fetch --no-tags origin master:refs/remotes/origin/master

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            MANUAL_REF="${INPUT_TARGET_REF}"
            if [ -z "${MANUAL_REF}" ]; then
              MANUAL_REF="${GITHUB_REF_NAME_VALUE}"
            fi

            if [ "${MANUAL_REF}" = "master" ] || [ "${MANUAL_REF}" = "refs/heads/master" ]; then
              echo "Manual releases targeting master are not allowed. Use push-to-master automation." >&2
              exit 1
            fi

            if git merge-base --is-ancestor "${TARGET_SHA}" "origin/master"; then
              echo "Manual releases for commits in master history are not allowed." >&2
              exit 1
            fi

            PRERELEASE_VALUE="${INPUT_PRERELEASE}"
            DRAFT_VALUE="${INPUT_DRAFT}"
          else
            if [ "${GITHUB_REF_NAME_VALUE}" != "master" ]; then
              echo "Push-based release is only allowed on master. Got: ${GITHUB_REF_NAME_VALUE}" >&2
              exit 1
            fi

            PRERELEASE_VALUE="false"
            DRAFT_VALUE="false"
          fi

          if [ -z "${GITVERSION_SEMVER}" ]; then
            echo "GitVersion did not return semVer output." >&2
            exit 1
          fi

          NORMALIZED_VERSION="${GITVERSION_SEMVER#v}"
          TAG="v${NORMALIZED_VERSION}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists locally: ${TAG}" >&2
            exit 1
          fi

          if git ls-remote --quiet --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag already exists on origin: ${TAG}" >&2
            exit 1
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${TARGET_SHA}^" 2>/dev/null || true)

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${TARGET_SHA}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE_VALUE}" >> "${GITHUB_OUTPUT}"
          echo "draft=${DRAFT_VALUE}" >> "${GITHUB_OUTPUT}"

      - name: Config summary
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
          PREVIOUS_TAG: ${{ steps.resolve.outputs.previous_tag }}
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
          DRAFT: ${{ steps.resolve.outputs.draft }}
        run: |
          echo "Release config"
          echo "-------------"
          echo "Tag: ${TAG}"
          echo "Target commit: ${TARGET_SHA}"
          echo "Previous tag: ${PREVIOUS_TAG:-<none>}"
          echo "Prerelease: ${PRERELEASE}"
          echo "Draft: ${DRAFT}"

  release:
    runs-on: ubuntu-latest
    needs: config
    env:
      GITHUB_TOKEN: ${{ github.token }}
      TAG: ${{ needs.config.outputs.tag }}
      TARGET_SHA: ${{ needs.config.outputs.target_sha }}
      PREVIOUS_TAG: ${{ needs.config.outputs.previous_tag }}
      PRERELEASE: ${{ needs.config.outputs.prerelease }}
      DRAFT: ${{ needs.config.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.config.outputs.target_sha }}

      - name: Create release notes from commit history
        run: |
          set -euo pipefail

          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${TARGET_SHA}"
          else
            RANGE="${TARGET_SHA}"
          fi

          {
            echo "## Changes"
            echo
            git log "${RANGE}" --no-merges --reverse --pretty=format:'- %s (%h)'
          } > release_notes.md

          if ! grep -q '^-' release_notes.md; then
            echo "- Initial release" >> release_notes.md
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail

          if git ls-remote --quiet --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag already exists on origin: ${TAG}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG}" "${TARGET_SHA}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub release
        run: |
          set -euo pipefail

          args=(release create "${TAG}" --target "${TARGET_SHA}" --title "${TAG}" --notes-file release_notes.md)

          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi

          if [ "${DRAFT}" = "true" ]; then
            args+=(--draft)
          fi

          gh "${args[@]}"
